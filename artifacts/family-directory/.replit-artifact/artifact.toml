kind = "web"
previewPath = "/"
title = "G K Shah Family Directory"
version = "1.0.0"
id = "artifacts/family-directory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20214

[services.development]
run = "pnpm --filter @workspace/family-directory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-directory", "run", "build" ]
publicDir = "artifacts/family-directory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20214"
BASE_PATH = "/"
